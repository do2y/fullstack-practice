<div class="container">
  <header>충정일보</header>

  <div class="main" id="news-list"></div>

  <div class="sidebar">
    <h3>Trend</h3>
    <p>#정치</p>
    <p>#경제</p>
    <p>#연예</p>
    <button onclick="openForm()">기사 작성하기</button>
  </div>
</div>

<!-- 글쓰기 모달 -->
<div id="form-modal" class="modal hidden">
  <div class="modal-content">
    <h3>기사 작성</h3>
    <input type="text" id="title" placeholder="제목" />
    <input type="text" id="category" placeholder="카테고리" />
    <input type="text" id="author" placeholder="기자 이름" />
    <textarea id="content" placeholder="본문"></textarea>

    <button onclick="submitNews()">등록</button>
    <button onclick="closeForm()">닫기</button>
  </div>
</div>
